

{% extends 'Learning_Logs/base.html' %}

{% block content %}

<h2>All Topics</h2>

<ul>
    {% for topic in topics %}
        <li>
            <a href="{% url 'Learning_Logs:topic' topic.id %}">{{ topic.text }}</a>
        </li>
    {% empty %}
        <li>No topics have been added yet.</li>
    {% endfor %}
</ul>

<a href="{% url 'Learning_Logs:new_topics' %}">Add a new topic</a>

{% endblock content %}
