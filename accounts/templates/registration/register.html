{% extends 'Learning_Logs/base.html' %}
{% load django_bootstrap5 %}

{% block page_header %}
    <h2>Register</h2>
{% endblock page_header %}

{% block content %}
    <div class="card shadow-sm">
        <div class="card-body">
            <form action="{% url 'accounts:register' %}" method="post">
                {% csrf_token %}
                {% bootstrap_form form %}
                {% bootstrap_button button_type="submit" content="Register" %}
            </form>
        </div>
    </div>
{% endblock content %}
